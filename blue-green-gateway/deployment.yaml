apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-gateway
  labels:
    app: custom-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-gateway
  template:
    metadata:
      labels:
        app: custom-gateway
    spec:
      serviceAccountName: gateway-service-account
      containers:
      - name: custom-gateway
        image: vasu1711/blue-green:service2         
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: DEP_CONTROLLER_ADD
          value: "deploymnet-controller.default.svc.cluster.local:8082"
        - name: TTL
          value: "300"  
  

--- 

apiVersion: v1
kind: Service
metadata:
  name: custom-gateway
spec:
  selector:
    app: custom-gateway
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

---

apiVersion: v1
kind: Namespace
metadata:
  name: macropod-functions

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-service-account



---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-role
subjects:
- kind: ServiceAccount
  name: gateway-service-account
  namespace: default
roleRef:
  kind: ClusterRole
  name: gateway-role
  apiGroup: rbac.authorization.k8s.io


---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploymnet-controller
  labels:
    app: deploymnet-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deploymnet-controller
  template:
    metadata:
      labels:
        app: deploymnet-controller
    spec:
      serviceAccountName: deploymnet-controller-sa
      containers:
      - name: deploymnet-controller
        image: vasu1711/blue-green-dm:service       
        imagePullPolicy: Always
        env: 
          - name: "NAMESPACE_INGRESS"
            value: "default"
        ports:
        - containerPort: 8082
        

--- 

apiVersion: v1
kind: Service
metadata:
  name: deploymnet-controller
spec:
  selector:
    app: deploymnet-controller
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082


---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploymnet-controller-sa
  namespace: default 


---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deploymnet-controller-role
rules:
- apiGroups: ["*"] 
  resources: ["*"] 
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deploymnet-controller-role
subjects:
- kind: ServiceAccount
  name: deploymnet-controller-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: deploymnet-controller-role
  apiGroup: rbac.authorization.k8s.io
